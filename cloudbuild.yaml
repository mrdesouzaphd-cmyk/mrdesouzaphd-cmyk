# Google Cloud Build — builds and deploys all 3 Cloud Run services.
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=us-central1

substitutions:
  _REGION: us-central1

steps:
  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.backend', '-t',
           '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/backend:$COMMIT_SHA',
           '.']
    id: build-backend

  # Build frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.frontend', '-t',
           '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/frontend:$COMMIT_SHA',
           '.']
    id: build-frontend

  # Build validation image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.validation', '-t',
           '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/validation:$COMMIT_SHA',
           '.']
    id: build-validation

  # Push all images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/backend:$COMMIT_SHA']
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/frontend:$COMMIT_SHA']
    waitFor: ['build-frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/validation:$COMMIT_SHA']
    waitFor: ['build-validation']

  # Tag as latest
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag',
           '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/backend:$COMMIT_SHA',
           '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/backend:latest']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag',
           '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/frontend:$COMMIT_SHA',
           '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/frontend:latest']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag',
           '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/validation:$COMMIT_SHA',
           '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/validation:latest']

  # Push latest tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/backend:latest']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/frontend:latest']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/validation:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: ['run', 'deploy', 'ebook-content-processor',
           '--image', '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/backend:$COMMIT_SHA',
           '--region', '${_REGION}',
           '--platform', 'managed']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: ['run', 'deploy', 'ebook-frontend-sales-platform',
           '--image', '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/frontend:$COMMIT_SHA',
           '--region', '${_REGION}',
           '--platform', 'managed',
           '--allow-unauthenticated']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: ['run', 'deploy', 'ebook-validation-workflow',
           '--image', '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/validation:$COMMIT_SHA',
           '--region', '${_REGION}',
           '--platform', 'managed']

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/backend:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/frontend:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/validation:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/backend:latest'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/frontend:latest'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/ebook-agent/validation:latest'
